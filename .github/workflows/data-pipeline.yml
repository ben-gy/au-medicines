name: Data Pipeline

on:
  schedule:
    # Source cadence: the PBS Date of Supply report is re-published MONTHLY
    # (each release adds one month and restates prior months; the two most
    # recent months are withheld). Monthly is therefore the matching — and the
    # factory's fastest permitted — cadence. Day 9, 04:23 UTC to stagger.
    - cron: '23 4 9 * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node pipeline/collect.mjs
      - run: node pipeline/aggregate.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update PBS data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
